<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TibiaBuilder - Nova Senha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="d-flex flex-column min-vh-100 bg-dark text-white align-items-center justify-content-center">

    <div class="auth-card rounded overflow-hidden shadow-lg"
        style="width: 100%; max-width: 400px; background-color: #1a1a1a; border: 1px solid #333;">
        <div class="auth-header text-center p-4" style="background-color: #111; border-bottom: 1px solid #333;">
            <a th:href="@{/}" class="text-decoration-none">
                <h3 class="tibia-logo fw-bold fs-2 m-0 text-warning"><i class="fa-solid fa-dragon"></i> TibiaBuilder
                </h3>
            </a>
            <p class="text-secondary mt-2 mb-0">Criar Nova Senha</p>
        </div>

        <div class="p-4">
            <form th:action="@{/resetar-senha}" method="post">
                <input type="hidden" name="token" th:value="${token}">

                <div class="mb-4">
                    <label class="form-label text-secondary small">Nova Senha</label>
                    <div class="input-group">
                        <span class="input-group-text bg-black border-secondary text-secondary"><i
                                class="fa-solid fa-lock"></i></span>
                        <input type="password" name="novaSenha" class="form-control bg-dark text-white border-secondary"
                            placeholder="Digite a nova senha" required minlength="6">
                    </div>
                </div>

                <button type="submit" class="btn btn-success w-100 fw-bold"><i class="fa-solid fa-check me-2"></i>
                    Alterar Senha</button>
            </form>
        </div>
    </div>

</body>

</html>
