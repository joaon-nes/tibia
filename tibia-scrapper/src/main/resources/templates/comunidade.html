<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Comunidade - TibiaBuilder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 6px;
            text-decoration: none;
            color: #aaa;
            transition: all 0.2s ease;
            background: transparent;
            cursor: pointer;
        }

        .menu-item:hover,
        .menu-item[aria-expanded="true"] {
            background-color: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .menu-icon {
            width: 24px;
            text-align: center;
            margin-right: 12px;
            font-size: 1.1em;
        }

        .menu-text {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .menu-title {
            font-size: 0.95em;
            font-weight: 500;
            line-height: 1.2;
            color: #dfdfdf;
            transition: color 0.2s;
        }

        .menu-subtitle {
            font-size: 0.75em;
            color: #666;
            margin-top: 2px;
        }

        .menu-item:hover .menu-title {
            color: #fff;
        }

        .chevron-icon {
            font-size: 0.75rem;
            transition: transform 0.3s ease;
            color: #666;
        }

        .menu-item[aria-expanded="true"] .chevron-icon {
            transform: rotate(180deg);
            color: #fff;
        }

        .submenu-container {
            padding-left: 36px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-top: 4px;
            margin-bottom: 8px;
            border-left: 1px solid #333;
            margin-left: 23px;
        }

        .submenu-item {
            font-size: 0.85em;
            color: #888;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 4px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .submenu-item:hover {
            color: #00b7ff;
            background-color: rgba(0, 183, 255, 0.05);
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100 bg-dark text-white">

    <div th:replace="~{fragments :: header}"></div>

    <main class="container-fluid px-lg-5 mb-5 flex-grow-1 mt-2">
        <div class="row g-4 h-100">

            <div th:replace="~{fragments :: sidebar}"></div>

            <div class="col-md-9 col-lg-9 col-xl-10 order-2">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold text-white mb-0"><i class="fa-solid fa-users text-warning me-2"></i> Comunidade
                    </h2>
                    <a href="/comunidade/criar" class="btn btn-warning fw-bold"><i class="fa-solid fa-plus me-1"></i>
                        Novo Tópico</a>
                </div>

                <div class="list-group bg-black border-secondary shadow" style="border-radius: 8px;">
                    <div th:each="topico : ${topicos}"
                        class="list-group-item list-group-item-action bg-dark text-white border-secondary p-3 mb-2 rounded border"
                        style="transition: transform 0.2s, border-color 0.2s; position: relative;"
                        onmouseover="this.style.borderColor='#00b7ff'; this.style.transform='translateY(-2px)';"
                        onmouseout="this.style.borderColor='var(--bs-secondary)'; this.style.transform='translateY(0)';">

                        <div class="row align-items-center">

                            <div class="col-md-7 d-flex align-items-center mb-3 mb-md-0">
                                <div class="me-3 flex-shrink-0" style="position: relative; z-index: 2;">
                                    <div class="rounded border border-secondary shadow-sm"
                                        style="width: 50px; height: 50px; background-color: #111; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                                        <img th:if="${topico.autor.avatar != null}" th:src="${topico.autor.avatar}"
                                            alt="Avatar" style="width: 100%; height: 100%; object-fit: cover;">
                                        <i th:unless="${topico.autor.avatar != null}"
                                            class="fa-solid fa-user text-secondary fs-4"></i>
                                    </div>
                                </div>

                                <div>
                                    <h5 class="mb-1 fw-bold" style="font-size: 1.15rem;">
                                        <a th:href="@{/comunidade/topico/{id}(id=${topico.id})}"
                                            class="text-decoration-none text-info stretched-link">
                                            <span th:text="${topico.titulo}">Titulo do Tópico</span>
                                        </a>
                                    </h5>
                                    <div class="text-secondary" style="font-size: 0.85rem;">
                                        Por <span class="text-light fw-bold"
                                            th:text="${topico.autor.username}">Autor</span>,
                                        <span th:text="${@dateUtil.formatarData(topico.dataCriacao)}">data</span>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-2 text-md-center mb-3 mb-md-0 border-start border-end border-secondary py-1"
                                style="font-size: 0.85rem;">
                                <div class="text-secondary mb-1">
                                    <span class="text-light fw-bold" th:text="${topico.postagens.size()}">0</span>
                                    respostas
                                </div>
                                <div class="text-secondary">
                                    <span class="text-light fw-bold"
                                        th:text="${topico.visualizacoes != null ? topico.visualizacoes : 0}">0</span>
                                    visualizações
                                </div>
                            </div>

                            <div class="col-md-3 text-md-end"
                                th:with="ultimoPost=${topico.postagens.size() > 0 ? topico.postagens[topico.postagens.size() - 1] : null}">
                                <div class="d-flex align-items-center justify-content-md-end">

                                    <div class="text-end me-3" style="position: relative; z-index: 3;">
                                        <a href="#"
                                            class="text-decoration-none text-light fw-bold small d-block text-truncate"
                                            style="max-width: 120px;"
                                            th:text="${ultimoPost != null ? ultimoPost.autor.username : topico.autor.username}">
                                            User
                                        </a>

                                        <div class="text-secondary mt-1 text-capitalize" style="font-size: 0.75rem;"
                                            th:text="${ultimoPost != null ? @dateUtil.formatarData(ultimoPost.dataPostagem) : @dateUtil.formatarData(topico.dataCriacao)}">
                                            data
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                    <div th:if="${#lists.isEmpty(topicos)}"
                        class="text-center py-5 text-secondary bg-dark rounded border border-secondary">
                        <i class="fa-solid fa-ghost fs-1 mb-3 text-secondary opacity-50"></i>
                        <p class="mb-0">Nenhum tópico criado ainda. Seja o primeiro a iniciar uma discussão!</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-black text-center text-secondary py-4 border-top border-dark mt-auto">
        <div class="container"><small>&copy; 2026 TibiaBuilder Project.</small></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/scripts/scripts.js}"></script>
</body>

</html>
