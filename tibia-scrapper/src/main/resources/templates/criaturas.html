<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TibiaBuilder - Bestiário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .category-list {
            max-height: 70vh;
            overflow-y: auto;
            border-radius: 8px;
        }

        .category-link {
            display: block;
            padding: 10px 15px;
            color: #aaa;
            text-decoration: none;
            border-bottom: 1px solid #222;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .category-link:hover {
            background: #111;
            color: #00b7ff;
        }

        .category-link.active {
            background: rgba(0, 183, 255, 0.1);
            color: #00b7ff;
            border-left: 3px solid #00b7ff;
        }

        .category-list::-webkit-scrollbar {
            width: 4px;
        }

        .category-list::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        .creature-card {
            transition: transform 0.2s, border-color 0.2s;
            border-radius: 12px;
            cursor: pointer;
        }

        .creature-card:hover {
            transform: translateY(-5px);
            border-color: #00b7ff !important;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            font-size: 0.75rem;
        }

        .stat-box {
            background: #111;
            border: 1px solid #222;
            padding: 4px;
            text-align: center;
            border-radius: 4px;
        }

        .res-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            margin-bottom: 4px;
        }

        .res-label {
            width: 82px;
            color: #aaa;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.72rem;
        }

        .res-value {
            font-weight: 600;
            width: 42px;
            text-align: right;
            flex-shrink: 0;
            font-size: 0.72rem;
        }

        .res-fill {
            flex: 1;
            height: 4px;
            border-radius: 2px;
            background: #222;
            overflow: hidden;
        }

        .res-fill-inner {
            height: 100%;
            border-radius: 2px;
        }

        .res-imune {
            color: #6c757d;
        }

        .res-forte {
            color: #ff6b6b;
        }

        .res-neutro {
            color: #adb5bd;
        }

        .res-fraco {
            color: #20c997;
        }

        .modal-content {
            background: #0d0d0d;
            border: 1px solid #333;
            color: #fff;
        }

        .modal-header {
            border-bottom: 1px solid #222;
        }

        .modal-footer {
            border-top: 1px solid #222;
        }

        .detail-block {
            background: #111;
            border: 1px solid #1e1e1e;
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 10px;
            font-size: 0.82rem;
        }

        .detail-block h6 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00b7ff;
            margin-bottom: 8px;
        }

        .loot-text {
            line-height: 1.8;
            color: #ccc;
            white-space: pre-line;
        }

        .badge-stat {
            display: inline-block;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 3px 8px;
            font-size: 0.75rem;
            margin: 2px;
        }

        .pagination .page-link {
            background: #111;
            border-color: #333;
            color: #aaa;
        }

        .pagination .page-link:hover {
            background: #1a1a1a;
            color: #00b7ff;
            border-color: #00b7ff;
        }

        .pagination .page-item.active .page-link {
            background: #00b7ff;
            border-color: #00b7ff;
            color: #000;
        }

        .pagination .page-item.disabled .page-link {
            background: #0a0a0a;
            color: #444;
            border-color: #222;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100 bg-dark text-white">
    <div th:replace="~{fragments :: header}"></div>

    <main class="container-fluid px-lg-5 mb-5 flex-grow-1 mt-2">
        <div class="row g-4">
            <div th:replace="~{fragments :: sidebar}"></div>

            <div class="col-lg-9 col-xl-10 order-2">
                <div class="row g-4">

                    <div class="col-lg-9">
                        <div
                            class="d-flex justify-content-between align-items-center mb-4 border-bottom border-secondary pb-3">
                            <h3 class="text-light m-0"
                                th:text="${categoriaSelecionada != null ? categoriaSelecionada : 'Bestiário'}">Categoria
                            </h3>
                            <span class="badge bg-dark border border-secondary" th:if="${totalCriaturas != null}"
                                th:text="${totalCriaturas} + ' criaturas'">0</span>
                        </div>

                        <div th:if="${categoriaSelecionada == null}" class="text-center py-5">
                            <i class="fa-solid fa-dragon fa-4x text-secondary opacity-25 mb-3"></i>
                            <h5 class="text-secondary" th:text="${mensagemInicial}">Selecione uma categoria...</h5>
                        </div>

                        <div class="row g-3">
                            <div th:each="criatura : ${criaturas}" class="col-md-6 col-xl-4">
                                <div class="card creature-card bg-black border-secondary h-100"
                                    th:attr="data-id=${criatura.id}" onclick="abrirModal(this.getAttribute('data-id'))">
                                    <div class="card-body p-3">
                                        <div class="text-center mb-3">
                                            <div style="height:64px;"
                                                class="d-flex align-items-center justify-content-center mb-2">
                                                <img th:src="${criatura.imagemUrl}" style="max-height:100%;"
                                                    th:alt="${criatura.nome}"
                                                    onerror="this.src='/tibia-images/placeholder.gif'">
                                            </div>
                                            <h6 class="text-light fw-bold m-0" th:text="${criatura.nome}">Nome</h6>
                                            <small class="text-secondary" th:if="${criatura.charms != null}"
                                                th:text="${criatura.charms} + ' charms'"></small>
                                        </div>
                                        <div class="stat-grid mb-2">
                                            <div class="stat-box">
                                                <small class="text-danger d-block" style="font-size:0.6rem;">HP</small>
                                                <span th:text="${criatura.hp != null ? criatura.hp : '—'}"></span>
                                            </div>
                                            <div class="stat-box">
                                                <small class="text-info d-block" style="font-size:0.6rem;">EXP</small>
                                                <span th:text="${criatura.exp != null ? criatura.exp : '—'}"></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <script type="application/json" th:inline="javascript"
                                    th:attr="id=${'c-' + criatura.id}">
                                {
                                    "id":          /*[[${criatura.id}]]*/             null,
                                    "nome":        /*[[${criatura.nome}]]*/           null,
                                    "categoria":   /*[[${criatura.categoria}]]*/      null,
                                    "imagemUrl":   /*[[${criatura.imagemUrl}]]*/      null,
                                    "hp":          /*[[${criatura.hp}]]*/             null,
                                    "exp":         /*[[${criatura.exp}]]*/            null,
                                    "charms":      /*[[${criatura.charms}]]*/         null,
                                    "physical":    /*[[${criatura.physicalDmgMod}]]*/ null,
                                    "earth":       /*[[${criatura.earthDmgMod}]]*/    null,
                                    "fire":        /*[[${criatura.fireDmgMod}]]*/     null,
                                    "death":       /*[[${criatura.deathDmgMod}]]*/    null,
                                    "energy":      /*[[${criatura.energyDmgMod}]]*/   null,
                                    "holy":        /*[[${criatura.holyDmgMod}]]*/     null,
                                    "ice":         /*[[${criatura.iceDmgMod}]]*/      null,
                                    "heal":        /*[[${criatura.healMod}]]*/        null,
                                    "hpdrain":     /*[[${criatura.hpDrainDmgMod}]]*/ null,
                                    "drown":       /*[[${criatura.drownDmgMod}]]*/    null,
                                    "abilities":   /*[[${criatura.abilities}]]*/      null,
                                    "loot":        /*[[${criatura.loot}]]*/           null,
                                    "comportamento":  /*[[${criatura.comportamento}]]*/  null,
                                    "locaisFixos":    /*[[${criatura.locaisFixos}]]*/    null,
                                    "locaisInvasao":  /*[[${criatura.locaisInvasao}]]*/  null,
                                    "imunidades":     /*[[${criatura.imunidades}]]*/     null,
                                    "passaPor":       /*[[${criatura.passaPor}]]*/       null,
                                    "summon":         /*[[${criatura.summon}]]*/         null,
                                    "boss":           /*[[${criatura.boss}]]*/           null,
                                    "bossDo":         /*[[${criatura.bossDo}]]*/         null
                                }
                                </script>
                            </div>
                        </div>

                        <nav th:if="${totalPaginas != null and totalPaginas > 1}" class="mt-4">
                            <ul class="pagination justify-content-center">
                                <li class="page-item" th:classappend="${!temAnterior} ? 'disabled'">
                                    <a class="page-link"
                                        th:href="@{/enciclopedia/criaturas(categoria=${categoriaSelecionada}, page=${paginaAtual - 1})}">
                                        <i class="fa-solid fa-chevron-left"></i>
                                    </a>
                                </li>

                                <li th:each="i : ${#numbers.sequence(0, totalPaginas - 1)}" class="page-item"
                                    th:classappend="${i == paginaAtual} ? 'active'">
                                    <a class="page-link"
                                        th:href="@{/enciclopedia/criaturas(categoria=${categoriaSelecionada}, page=${i})}"
                                        th:text="${i + 1}">1</a>
                                </li>

                                <li class="page-item" th:classappend="${!temProxima} ? 'disabled'">
                                    <a class="page-link"
                                        th:href="@{/enciclopedia/criaturas(categoria=${categoriaSelecionada}, page=${paginaAtual + 1})}">
                                        <i class="fa-solid fa-chevron-right"></i>
                                    </a>
                                </li>
                            </ul>
                            <p class="text-center text-secondary" style="font-size:0.8rem;">
                                Página <span th:text="${paginaAtual + 1}"></span> de <span
                                    th:text="${totalPaginas}"></span>
                            </p>
                        </nav>
                    </div>

                    <div class="col-lg-3">
                        <h6 class="text-warning mb-3 fw-bold text-uppercase"
                            style="font-size:0.75rem;letter-spacing:1px;">Grupos de Criaturas</h6>
                        <div class="category-list">
                            <a th:each="cat : ${categorias}" th:href="@{/enciclopedia/criaturas(categoria=${cat})}"
                                th:classappend="${cat == categoriaSelecionada} ? 'active' : ''" class="category-link">
                                <i class="fa-solid fa-angle-right me-2" style="font-size:0.7rem;"></i>
                                <span th:text="${cat}">Nome Grupo</span>
                            </a>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="modalCriatura" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <div class="d-flex align-items-center gap-3">
                        <img id="modal-imagem" src="" alt="" style="height:48px;">
                        <div>
                            <h5 class="modal-title mb-0" id="modal-nome">—</h5>
                            <small class="text-secondary" id="modal-categoria">—</small>
                        </div>
                    </div>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-12">
                            <div class="detail-block">
                                <h6><i class="fa-solid fa-chart-bar me-1"></i> Estatísticas</h6>
                                <div class="d-flex flex-wrap gap-2">
                                    <span class="badge-stat d-flex align-items-center">
                                        <img src="/tibia-images/Icones/Hearthp.png" alt="HP"
                                            style="width:14px; height:14px; object-fit:contain;" class="me-1">
                                        HP: <b id="modal-hp" class="ms-1">—</b>
                                    </span>

                                    <span class="badge-stat d-flex align-items-center">
                                        <img src="/tibia-images/Icones/Xpbestiary.png" alt="EXP"
                                            style="width:14px; height:14px; object-fit:contain;" class="me-1">
                                        EXP: <b id="modal-exp" class="ms-1">—</b>
                                    </span>

                                    <span class="badge-stat d-flex align-items-center">
                                        <img src="/tibia-images/Icones/Charm.gif" alt="Charms"
                                            style="width:14px; height:14px; object-fit:contain;" class="me-1">
                                        Charms: <b id="modal-charms" class="ms-1">—</b>
                                    </span>
                                </div>
                                <div id="modal-boss-block" class="mt-2" style="display:none">
                                    <small class="text-secondary">Boss de: </small><span id="modal-boss"
                                        class="text-warning fw-bold"></span>
                                </div>
                                <div id="modal-boss-do-block" class="mt-1" style="display:none">
                                    <small class="text-secondary">Boss do(a): </small><span id="modal-boss-do"
                                        class="text-warning fw-bold"></span>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="detail-block h-100">
                                <h6><i class="fa-solid fa-shield-halved me-1"></i> Proteções</h6>
                                <div id="modal-resistencias"></div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="detail-block h-100">
                                <h6><i class="fa-solid fa-eye me-1"></i> Comportamento</h6>
                                <p class="mb-1" id="modal-comportamento" style="font-size:0.82rem;color:#ccc;">—</p>
                                <div id="modal-imunidades-block" style="display:none">
                                    <small class="text-secondary d-block">Imunidades:</small>
                                    <span id="modal-imunidades" class="text-light" style="font-size:0.8rem;"></span>
                                </div>
                                <div id="modal-passa-por-block" class="mt-1" style="display:none">
                                    <small class="text-secondary d-block">Passa por:</small>
                                    <span id="modal-passa-por" class="text-light" style="font-size:0.8rem;"></span>
                                </div>
                                <div id="modal-summon-block" class="mt-1" style="display:none">
                                    <small class="text-secondary d-block">Summona:</small>
                                    <span id="modal-summon" class="text-light" style="font-size:0.8rem;"></span>
                                </div>
                            </div>
                        </div>
                        <div class="col-12" id="modal-habilidades-block" style="display:none">
                            <div class="detail-block">
                                <h6><i class="fa-solid fa-wand-magic-sparkles me-1"></i> Habilidades de Combate</h6>
                                <p class="mb-0 loot-text" id="modal-habilidades"></p>
                            </div>
                        </div>
                        <div class="col-12" id="modal-locais-block" style="display:none">
                            <div class="detail-block">
                                <h6><i class="fa-solid fa-location-dot me-1"></i> Localização</h6>
                                <div id="modal-locais-fixos-block" style="display:none">
                                    <small class="text-secondary">Locais Fixos:</small>
                                    <p class="mb-1 loot-text" id="modal-locais-fixos"></p>
                                </div>
                                <div id="modal-locais-invasao-block" style="display:none">
                                    <small class="text-secondary">Invasões:</small>
                                    <p class="mb-0 loot-text" id="modal-locais-invasao"></p>
                                </div>
                            </div>
                        </div>
                        <div class="col-12" id="modal-loot-block" style="display:none">
                            <div class="detail-block">
                                <h6><i class="fa-solid fa-coins me-1"></i> Loot</h6>
                                <p class="mb-0 loot-text" id="modal-loot"></p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-sm btn-outline-secondary"
                        data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/scripts/scripts.js}"></script>
    <script>
        const ICONES = '/tibia-images/Icones';
        const RESISTENCIAS = [
            { key: 'physical', label: 'Physical', img: 'Physical_Damage_Icon', color: '#adb5bd' },
            { key: 'earth', label: 'Earth', img: 'Poisoned_Icon', color: '#20c997' },
            { key: 'fire', label: 'Fire', img: 'Burned_Icon', color: '#ff6b6b' },
            { key: 'death', label: 'Death', img: 'Cursed_Icon', color: '#9b59b6' },
            { key: 'energy', label: 'Energy', img: 'Electrified_Icon', color: '#4e9ef5' },
            { key: 'holy', label: 'Holy', img: 'Holy_Damage_Icon', color: '#f0c040' },
            { key: 'ice', label: 'Ice', img: 'Freezing_Icon', color: '#74c0fc' },
            { key: 'heal', label: 'Healing', img: 'Healing_Icon', color: '#f06595' },
            { key: 'hpdrain', label: 'Life Drain', img: 'Life_Drain_Icon', color: '#e74c3c' },
            { key: 'mpdrain', label: 'Mana Drain', img: 'Mana_Drain_Icon', color: '#8e44ad' },
            { key: 'drown', label: 'Drowning', img: 'Drowning_Icon', color: '#3498db' },
        ];

        function resClass(val) {
            const n = parseInt(val);
            if (isNaN(n)) return 'res-neutro';
            if (n === 0) return 'res-imune';
            if (n < 100) return 'res-forte';
            if (n === 100) return 'res-neutro';
            return 'res-fraco';
        }

        function formatarHabilidades(texto) {
            if (!texto) return '';
            return texto.replace(/(Físico:|Fire:|Energy:|Death:|Earth:|Holy:|Ice:|Cura:|Life Drain:|Mana Drain:|Velocidade:|Invoca:|Paralisa:|Debuff:|Summon:)/g, '\n$1').trim();
        }

        function formatarLoot(texto) {
            if (!texto) return '';
            return texto.replace(/(Incomum:|Semi-raro:|Semi-Raro:|Raro:|Muito raro:|Muito Raro:|Comum:|Durante Invasões:|Loot:)/g, '\n$1').trim();
        }

        function set(id, val) {
            const el = document.getElementById(id);
            if (el) el.textContent = (val !== null && val !== undefined && val !== 'null') ? val : '—';
        }

        function show(id, condition) {
            const el = document.getElementById(id);
            if (el) el.style.display = (condition && condition !== 'null') ? '' : 'none';
        }

        var modalBS = null;

        function abrirModal(id) {
            const scriptEl = document.getElementById('c-' + id);
            if (!scriptEl) { console.error('JSON não encontrado para id:', id); return; }

            var d;
            try { d = JSON.parse(scriptEl.textContent); }
            catch (e) { console.error('Erro ao parsear JSON:', e); return; }

            document.getElementById('modal-imagem').src = d.imagemUrl || '';
            document.getElementById('modal-imagem').alt = d.nome || '';
            set('modal-nome', d.nome);
            set('modal-categoria', d.categoria);
            set('modal-hp', d.hp);
            set('modal-exp', d.exp);
            set('modal-charms', d.charms);

            show('modal-boss-block', d.boss);
            show('modal-boss-do-block', d.bossDo);
            set('modal-boss', d.boss);
            set('modal-boss-do', d.bossDo);

            const resContainer = document.getElementById('modal-resistencias');
            resContainer.innerHTML = '';
            RESISTENCIAS.forEach(function (r) {
                const val = d[r.key];
                if (!val || val === 'null') return;
                const cls = resClass(val);
                const width = Math.min(100, parseInt(val) || 0);
                resContainer.innerHTML += '<div class="res-bar">'
                    + '<span class="res-label"><img src="' + ICONES + '/' + r.img + '.gif" style="width:14px;height:14px;object-fit:contain;"> ' + r.label + '</span>'
                    + '<span class="res-value ' + cls + '">' + val + '</span>'
                    + '<div class="res-fill"><div class="res-fill-inner" style="width:' + width + '%;background:' + r.color + ';opacity:0.6;"></div></div>'
                    + '</div>';
            });

            set('modal-comportamento', d.comportamento);
            show('modal-imunidades-block', d.imunidades);
            show('modal-passa-por-block', d.passaPor);
            show('modal-summon-block', d.summon);
            set('modal-imunidades', d.imunidades);
            set('modal-passa-por', d.passaPor);
            set('modal-summon', d.summon);

            show('modal-habilidades-block', d.abilities);
            document.getElementById('modal-habilidades').textContent = formatarHabilidades(d.abilities);

            const temLocais = d.locaisFixos || d.locaisInvasao;
            show('modal-locais-block', temLocais);
            show('modal-locais-fixos-block', d.locaisFixos);
            show('modal-locais-invasao-block', d.locaisInvasao);
            set('modal-locais-fixos', d.locaisFixos);
            set('modal-locais-invasao', d.locaisInvasao);

            show('modal-loot-block', d.loot);
            document.getElementById('modal-loot').textContent = formatarLoot(d.loot);

            if (!modalBS) modalBS = new bootstrap.Modal(document.getElementById('modalCriatura'));
            modalBS.show();
        }
    </script>
</body>

</html>
