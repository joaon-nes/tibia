<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TibiaBuilder - Notificações</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 6px;
            text-decoration: none;
            color: #aaa;
            transition: all 0.2s ease;
            background: transparent;
            cursor: pointer;
        }

        .menu-item:hover,
        .menu-item[aria-expanded="true"] {
            background-color: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .menu-icon {
            width: 24px;
            text-align: center;
            margin-right: 12px;
            font-size: 1.1em;
        }

        .menu-text {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .menu-title {
            font-size: 0.95em;
            font-weight: 500;
            line-height: 1.2;
            color: #dfdfdf;
            transition: color 0.2s;
        }

        .menu-subtitle {
            font-size: 0.75em;
            color: #666;
            margin-top: 2px;
        }

        .menu-item:hover .menu-title {
            color: #fff;
        }

        .chevron-icon {
            font-size: 0.75rem;
            transition: transform 0.3s ease;
            color: #666;
        }

        .menu-item[aria-expanded="true"] .chevron-icon {
            transform: rotate(180deg);
            color: #fff;
        }

        .submenu-container {
            padding-left: 36px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-top: 4px;
            margin-bottom: 8px;
            border-left: 1px solid #333;
            margin-left: 23px;
        }

        .submenu-item {
            font-size: 0.85em;
            color: #888;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 4px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .submenu-item:hover {
            color: #00b7ff;
            background-color: rgba(0, 183, 255, 0.05);
        }

        .notif-card {
            transition: all 0.2s ease;
            border-left: 4px solid transparent;
        }

        .notif-card:hover {
            background-color: #1a1a1a !important;
        }

        .notif-unread {
            border-left-color: #f19c2b !important;
            background-color: rgba(241, 156, 43, 0.05) !important;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100 bg-dark text-white">

    <div th:replace="~{fragments :: header}"></div>

    <main class="container-fluid px-lg-5 mb-5 flex-grow-1 mt-2">
        <div class="row g-4">

            <div th:replace="~{fragments :: sidebar}"></div>

            <div class="col-md-9 col-lg-9 col-xl-10 order-2">

                <div class="d-flex justify-content-between align-items-center mb-4 mt-1 border-bottom border-dark pb-3">
                    <div>
                        <h2 class="text-warning mb-0" style="font-family: 'Cinzel', serif;">
                            <i class="fa-solid fa-bell me-2"></i>Notificações
                        </h2>
                        <p class="text-secondary small m-0 mt-1">Acompanhe as interações no seu perfil e anúncios.</p>
                    </div>
                    <div>
                        <a href="/notificacoes/ler-todas" class="btn btn-sm btn-outline-info shadow-sm">
                            <i class="fa-solid fa-check-double me-1"></i> Marcar todas como lidas
                        </a>
                    </div>
                </div>

                <div class="card bg-black border-secondary shadow-lg">
                    <div class="list-group list-group-flush rounded">

                        <div th:each="notif : ${notificacoes}"
                            class="list-group-item bg-dark text-white border-secondary p-3 notif-card d-flex align-items-center"
                            th:classappend="${!notif.lida} ? 'notif-unread' : ''">

                            <div class="me-3 text-secondary"
                                style="width: 40px; text-align: center; font-size: 1.5rem;">
                                <i class="fa-solid"
                                    th:classappend="${notif.getIcone() != null ? notif.getIcone() : 'fa-bell'}"></i>
                            </div>

                            <div class="flex-grow-1">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <small class="text-secondary"
                                        th:text="${#temporals.format(notif.data, 'dd/MM/yyyy HH:mm')}">Data</small>
                                    <span th:if="${!notif.lida}" class="badge bg-warning text-dark"
                                        style="font-size: 0.65em;">NOVA</span>
                                </div>

                                <a th:href="@{/notificacoes/ler/{id}(id=${notif.id})}"
                                    class="text-decoration-none text-light stretched-link d-block">
                                    <strong class="text-info" th:if="${notif.remetente != null}"
                                        th:text="${notif.remetente.charName != null ? notif.remetente.charName : notif.remetente.username}">Remetente</strong>
                                    <span th:text="${notif.mensagem}">Mensagem...</span>
                                </a>
                            </div>
                        </div>

                        <div th:if="${#lists.isEmpty(notificacoes)}" class="text-center py-5">
                            <i class="fa-regular fa-bell-slash text-secondary mb-3"
                                style="font-size: 3rem; opacity: 0.3;"></i>
                            <h5 class="text-secondary">A sua caixa de entrada está vazia.</h5>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script th:src="@{/scripts/scripts.js}"></script>
</body>

</html>
