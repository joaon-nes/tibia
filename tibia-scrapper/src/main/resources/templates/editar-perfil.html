<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - TibiaBuilder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 6px;
            text-decoration: none;
            color: #aaa;
            transition: all 0.2s ease;
            background: transparent;
            cursor: pointer;
        }

        .menu-item:hover,
        .menu-item[aria-expanded="true"] {
            background-color: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .menu-icon {
            width: 24px;
            text-align: center;
            margin-right: 12px;
            font-size: 1.1em;
        }

        .menu-text {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .menu-title {
            font-size: 0.95em;
            font-weight: 500;
            line-height: 1.2;
            color: #dfdfdf;
            transition: color 0.2s;
        }

        .menu-subtitle {
            font-size: 0.75em;
            color: #666;
            margin-top: 2px;
        }

        .menu-item:hover .menu-title {
            color: #fff;
        }

        .chevron-icon {
            font-size: 0.75rem;
            transition: transform 0.3s ease;
            color: #666;
        }

        .menu-item[aria-expanded="true"] .chevron-icon {
            transform: rotate(180deg);
            color: #fff;
        }

        .submenu-container {
            padding-left: 36px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-top: 4px;
            margin-bottom: 8px;
            border-left: 1px solid #333;
            margin-left: 23px;
        }

        .submenu-item {
            font-size: 0.85em;
            color: #888;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 4px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .submenu-item:hover {
            color: #00b7ff;
            background-color: rgba(0, 183, 255, 0.05);
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100 bg-dark text-white">

    <div th:replace="~{fragments :: header}"></div>

    <main class="container-fluid px-lg-5 mb-5 flex-grow-1 mt-2">
        <div class="row g-4 h-100">
            <div th:replace="~{fragments :: sidebar}"></div>

            <div class="col-md-9 col-lg-9 col-xl-10 order-2 d-flex align-items-start justify-content-center pt-4">

                <div class="card text-white shadow-lg border-secondary"
                    style="max-width: 500px; width: 100%; background-color: #1a1a1a; border-radius: 12px; overflow: hidden;">
                    <div class="card-header border-bottom border-dark text-center py-4"
                        style="background-color: #0a0a0a;">
                        <h3 class="mb-0 text-warning" style="font-family: 'Cinzel', serif;"><i
                                class="fa-solid fa-user-pen me-2"></i>Editar Perfil</h3>
                    </div>

                    <div class="card-body p-4">
                        <div th:if="${param.sucesso}"
                            class="alert alert-success border-success text-success bg-dark py-2 small mb-3">
                            <i class="fa-solid fa-check-circle me-1"></i> Perfil atualizado com sucesso!
                        </div>
                        <div th:if="${param.erro}"
                            class="alert alert-danger border-danger text-danger bg-dark py-2 small mb-3">
                            <i class="fa-solid fa-circle-exclamation me-1"></i> Erro ao atualizar perfil.
                        </div>

                        <form th:action="@{/perfil/atualizar}" method="post" enctype="multipart/form-data">
                            <div class="text-center mb-4">
                                <div class="bg-dark border border-secondary text-secondary rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3 shadow overflow-hidden"
                                    style="width: 120px; height: 120px;" id="avatar-container">
                                    <img th:if="${usuario.avatar != null}" th:src="${usuario.avatar}"
                                        style="width: 100%; height: 100%; object-fit: cover;">
                                    <i th:unless="${usuario.avatar != null}" class="fa-solid fa-user"
                                        style="font-size: 4rem;"></i>
                                </div>
                                <label class="btn btn-sm btn-outline-warning" style="font-weight: 500;">
                                    <i class="fa-solid fa-camera me-1"></i> Alterar Foto
                                    <input type="file" name="imagemPerfil" class="d-none" accept="image/*"
                                        onchange="previewImage(this)">
                                </label>
                            </div>

                            <div class="mb-3">
                                <label class="form-label text-secondary small mb-1">Email (Não editável)</label>
                                <div class="input-group input-group-sm">
                                    <span class="input-group-text bg-dark border-secondary text-secondary"><i
                                            class="fa-solid fa-envelope"></i></span>
                                    <input type="text" class="form-control bg-dark text-white-50 border-secondary"
                                        th:value="${usuario.email}" disabled readonly>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="nome" class="form-label text-secondary small mb-1">Nome de Exibição</label>
                                <div class="input-group input-group-sm">
                                    <span class="input-group-text bg-dark border-secondary text-secondary"><i
                                            class="fa-solid fa-user"></i></span>
                                    <input type="text" class="form-control bg-black text-white border-secondary"
                                        id="nome" name="nome" th:value="${usuario.nome}" required>
                                </div>
                            </div>

                            <hr class="border-secondary my-4 opacity-50">

                            <div class="mb-4">
                                <label for="senha" class="form-label text-secondary small mb-1">Nova Senha
                                    (Opcional)</label>
                                <div class="input-group input-group-sm">
                                    <span class="input-group-text bg-dark border-secondary text-secondary"><i
                                            class="fa-solid fa-lock"></i></span>
                                    <input type="password" class="form-control bg-black text-white border-secondary"
                                        id="senha" name="senha" placeholder="Deixe em branco para manter a atual">
                                </div>
                            </div>

                            <div class="d-grid gap-2 mt-4 pt-2 border-top border-dark pt-3">
                                <button type="submit" class="btn btn-warning" style="font-weight: 500;">
                                    <i class="fa-solid fa-floppy-disk me-2"></i> Salvar Alterações
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/scripts/scripts.js}"></script>

    <script>
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const container = document.getElementById('avatar-container');
                const file = input.files[0];
                const reader = new FileReader();

                reader.onload = function (e) {
                    container.innerHTML = `<img src="${e.target.result}" style="width: 100%; height: 100%; object-fit: cover;">`;
                }
                reader.readAsDataURL(file);
            }
        }
    </script>
</body>

</html>
