<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TibiaBuilder - Buscar Party</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 6px;
            text-decoration: none;
            color: #aaa;
            transition: all 0.2s ease;
            background: transparent;
            cursor: pointer;
        }

        .menu-item:hover,
        .menu-item[aria-expanded="true"] {
            background-color: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .menu-icon {
            width: 24px;
            text-align: center;
            margin-right: 12px;
            font-size: 1.1em;
        }

        .menu-text {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .menu-title {
            font-size: 0.95em;
            font-weight: 500;
            line-height: 1.2;
            color: #dfdfdf;
            transition: color 0.2s;
        }

        .menu-subtitle {
            font-size: 0.75em;
            color: #666;
            margin-top: 2px;
        }

        .menu-item:hover .menu-title {
            color: #fff;
        }

        .chevron-icon {
            font-size: 0.75rem;
            transition: transform 0.3s ease;
            color: #666;
        }

        .menu-item[aria-expanded="true"] .chevron-icon {
            transform: rotate(180deg);
            color: #fff;
        }

        .submenu-container {
            padding-left: 36px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-top: 4px;
            margin-bottom: 8px;
            border-left: 1px solid #333;
            margin-left: 23px;
        }

        .submenu-item {
            font-size: 0.85em;
            color: #888;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 4px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .submenu-item:hover {
            color: #00b7ff;
            background-color: rgba(0, 183, 255, 0.05);
        }

        .party-card {
            background-color: #111;
            border: 1px solid #333;
            border-radius: 8px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .party-card:hover {
            border-color: #f19c2b;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        .mini-equip-slot {
            width: 34px;
            height: 34px;
            background-color: #050505;
            border: 1px solid #333;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .mini-equip-slot img {
            max-width: 24px;
            max-height: 24px;
            object-fit: contain;
        }

        .xp-range-box {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 2px 6px;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100 bg-dark text-white">
    <div th:replace="~{fragments :: header}"></div>

    <main class="container-fluid px-lg-5 mb-5 flex-grow-1 mt-2">
        <div class="row g-4">

            <div th:replace="~{fragments :: sidebar}"></div>

            <div class="col-md-9 col-lg-9 col-xl-10 order-2">

                <div class="d-flex justify-content-between align-items-center mb-4 mt-1 border-bottom border-dark pb-3">
                    <div>
                        <h2 class="text-warning mb-0" style="font-family: 'Cinzel', serif;"><i
                                class="fa-solid fa-users-viewfinder me-2"></i>Buscar Party</h2>
                        <p class="text-secondary small m-0 mt-1">Encontre jogadores com base no seu status real.</p>
                    </div>

                    <div th:if="${usuarioLogado != null}">
                        <button th:if="${!jaAnunciou}" class="btn btn-info shadow-sm" data-bs-toggle="modal"
                            data-bs-target="#modalAnunciar"> Anunciar busca
                        </button>
                        <form th:if="${jaAnunciou}" th:action="@{/buscar-party/remover}" method="post"
                            style="display: inline;">
                            <button type="submit" class="btn btn-outline-danger btn-sm">Remover minha busca</button>
                        </form>
                    </div>
                </div>

                <div th:if="${sucesso}" class="alert alert-success bg-dark border-success text-success py-2 small mb-4">
                    <i class="fa-solid fa-circle-check me-2"></i> <span th:text="${sucesso}"></span>
                </div>
                <div th:if="${erro}" class="alert alert-danger bg-dark border-danger text-danger py-2 small mb-4">
                    <i class="fa-solid fa-triangle-exclamation me-2"></i> <span th:text="${erro}"></span>
                </div>

                <div class="row g-3">
                    <div class="col-12 col-xl-6" th:each="anuncio : ${anuncios}">
                        <div class="party-card p-3 shadow-lg d-flex flex-column h-100">

                            <div
                                class="d-flex justify-content-between align-items-start border-bottom border-secondary pb-3 mb-3">
                                <div>
                                    <h5 class="text-warning mb-1 fw-bold text-truncate"
                                        th:text="${anuncio.usuario.charName}">Nome do Char</h5>
                                    <span class="text-secondary small">
                                        Level <span class="text-light" th:text="${anuncio.usuario.charLevel}">0</span> -
                                        <span th:text="${anuncio.usuario.charVocation}">Vocação</span>
                                    </span>
                                    <div class="mt-2 d-flex gap-1 align-items-center flex-wrap">
                                        <span class="badge bg-dark border border-secondary text-info"
                                            th:text="${anuncio.tipoBusca}">x4</span>

                                        <span class="badge bg-dark border border-secondary"
                                            th:classappend="${#strings.containsIgnoreCase(anuncio.objetivo, 'PvP')} ? 'text-danger' : 'text-warning'"
                                            th:text="${anuncio.objetivo}">Hunt</span>
                                    </div>
                                </div>
                                <div class="text-end flex-shrink-0 ms-2">

                                    <th:block
                                        th:if="${usuarioLogado != null && usuarioLogado.id != anuncio.usuario.id}">
                                        <th:block th:with="
                                            minLvl=${T(java.lang.Math).ceil(anuncio.usuario.charLevel * 2.0 / 3.0).intValue()},
                                            maxLvl=${T(java.lang.Math).floor(anuncio.usuario.charLevel * 1.5).intValue()},
                                            meuLvl=${usuarioLogado.charLevel != null ? usuarioLogado.charLevel : 0},
                                            podeSharear=${meuLvl >= minLvl && meuLvl <= maxLvl}">

                                            <form th:if="${podeSharear}"
                                                th:action="@{/buscar-party/interesse/{id}(id=${anuncio.id})}"
                                                method="post" class="mb-2">
                                                <button type="submit"
                                                    class="btn btn-sm btn-outline-success py-1 px-2 shadow-sm w-100"
                                                    style="font-size: 0.75rem;">Tenho Interesse
                                                </button>
                                            </form>

                                            <div th:if="${!podeSharear}" class="mb-2 text-center">
                                                <button type="button"
                                                    class="btn btn-sm btn-outline-secondary py-1 px-2 shadow-sm w-100"
                                                    style="font-size: 0.70rem; cursor: not-allowed;" disabled
                                                    title="Seu level não permite compartilhar XP com este jogador.">
                                                    <i class="fa-solid fa-ban me-1"></i> Level Incompatível
                                                </button>
                                            </div>
                                        </th:block>
                                    </th:block>

                                    <div th:if="${usuarioLogado != null && usuarioLogado.id == anuncio.usuario.id}"
                                        class="mb-2 text-center">
                                        <span class="badge bg-secondary text-dark w-100">Meu Anúncio</span>
                                    </div>

                                    <span class="d-block fw-bold xp-range-box text-secondary"
                                        style="font-size: 0.75rem; white-space: nowrap;">
                                        Level min <span class="text-white"
                                            th:text="${T(java.lang.Math).ceil(anuncio.usuario.charLevel * 2.0 / 3.0).intValue()}"></span>
                                        - max <span class="text-white"
                                            th:text="${T(java.lang.Math).floor(anuncio.usuario.charLevel * 1.5).intValue()}"></span>
                                    </span>
                                </div>
                            </div>

                            <div class="p-3 border border-dark rounded flex-grow-1 shadow-sm d-flex flex-column position-relative anuncio-render-area"
                                style="background-color: #050505; z-index: 2;" th:attr="data-user-json=${anuncio.usuario.setsEquipamentos}, 
                                          data-voc=${anuncio.usuario.charVocation},
                                          data-ml=${anuncio.usuario.magicLevel},
                                          data-dist=${anuncio.usuario.distanceSkill},
                                          data-sword=${anuncio.usuario.swordSkill},
                                          data-axe=${anuncio.usuario.axeSkill},
                                          data-club=${anuncio.usuario.clubSkill},
                                          data-shield=${anuncio.usuario.shieldingSkill},
                                          data-fist=${anuncio.usuario.fistSkill}">
                            </div>

                        </div>
                    </div>

                    <div class="col-12 text-center py-5" th:if="${#lists.isEmpty(anuncios)}">
                        <i class="fa-solid fa-hourglass-empty text-secondary mb-3" style="font-size: 3rem;"></i>
                        <h5 class="text-secondary">Ninguém procurando party no momento.</h5>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div class="modal fade" id="modalAnunciar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark border-secondary text-white">
                <div class="modal-header border-secondary bg-black">
                    <h5 class="modal-title text-warning">Procurar Grupo</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/buscar-party/anunciar}" method="post">
                    <div class="modal-body bg-black">
                        <div class="mb-3">
                            <label class="form-label text-secondary small">O que você busca?</label>
                            <select name="tipoBusca" class="form-select bg-dark text-white border-secondary">
                                <option value="Duo">Duo</option>
                                <option value="x3">x3</option>
                                <option value="x4">x4</option>
                                <option value="x5">x5</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary small">Objetivo</label>
                            <select name="objetivo" class="form-select bg-dark text-white border-secondary">
                                <option value="Hunt">Hunt</option>
                                <option value="Bosses">Bosses</option>
                                <option value="PvP">PvP</option>
                            </select>
                        </div>
                        <div class="mb-3 position-relative" id="divObjetivoEspecifico">
                            <label class="form-label text-secondary small">Hunt / Boss</label>

                            <input type="text" name="objetivoEspecifico" id="inputObjetivoEspecifico"
                                class="form-control bg-dark text-white border-secondary"
                                placeholder="Ex: Werelions, Cobra Bastion, Defesa..." maxlength="100"
                                autocomplete="off">

                            <div id="sugestoesParty" class="list-group position-absolute w-100 shadow-lg"
                                style="z-index: 1050; max-height: 200px; overflow-y: auto; display: none; border: 1px solid #444;">
                            </div>

                            <div id="infoHuntParty"
                                class="mt-2 p-2 border border-secondary rounded bg-dark d-none transition"></div>
                        </div>
                    </div>
                    <div class="modal-footer border-secondary bg-black">
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-info btn-sm">Publicar Anúncio</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/scripts/scripts.js}"></script>
    <script>
        const slotMatrix = [
            ["Amulets", "Helmets", "Backpacks"], ["Weapons", "Armors", "Shields"],
            ["Rings", "Legs", "ExtraSlot"], [null, "Boots", null]
        ];

        const imagensPadrao = {
            "Amulets": "https://www.tibiawiki.com.br/images/3/3e/Crystal_Necklace.gif",
            "Helmets": "https://www.tibiawiki.com.br/images/2/29/Leather_Helmet.gif",
            "Backpacks": "https://www.tibiawiki.com.br/images/9/9a/Backpack.gif",
            "Weapons": "https://www.tibiawiki.com.br/images/1/1f/Sword.gif",
            "Armors": "https://www.tibiawiki.com.br/images/0/0d/Leather_Armor.gif",
            "Shields": "https://www.tibiawiki.com.br/images/2/2d/Wooden_Shield.gif",
            "Rings": "https://www.tibiawiki.com.br/images/d/db/Axe_Ring.gif",
            "Legs": "https://www.tibiawiki.com.br/images/0/07/Leather_Legs.gif",
            "ExtraSlot": "https://www.tibiawiki.com.br/images/4/46/Moon_Mirror.gif",
            "Boots": "https://www.tibiawiki.com.br/images/9/94/Leather_Boots.gif"
        };

        function calcularBonus(activeData) {
            let bonus = { ml: 0, dist: 0, sword: 0, axe: 0, club: 0, shield: 0, fist: 0 };
            let protecoes = { physical: 1, fire: 1, earth: 1, ice: 1, energy: 1, death: 1, holy: 1, lifeDrain: 1, manaDrain: 1 };
            let specials = { crit: 0, life: 0, mana: 0 };

            if (!activeData) return { bonus, protecoes, specials };

            const imbStats = {
                "Magic Level (Epiphany)": { stat: "ml", bonus: [1, 2, 4] },
                "Distance Skill (Precision)": { stat: "dist", bonus: [1, 2, 4] },
                "Sword Skill (Slash)": { stat: "sword", bonus: [1, 2, 4] },
                "Axe Skill (Chop)": { stat: "axe", bonus: [1, 2, 4] },
                "Club Skill (Bash)": { stat: "club", bonus: [1, 2, 4] },
                "Shielding (Blockade)": { stat: "shield", bonus: [1, 2, 4] },
                "Fire Protection (Dragon Hide)": { protElement: "fire", bonus: [3, 8, 15] },
                "Earth Protection (Lich Shroud)": { protElement: "earth", bonus: [3, 8, 15] },
                "Ice Protection (Quagmire)": { protElement: "ice", bonus: [3, 8, 15] },
                "Energy Protection (Cloud Fabric)": { protElement: "energy", bonus: [3, 8, 15] },
                "Death Protection (Demon Presence)": { protElement: "death", bonus: [2, 5, 10] },
                "Holy Protection (Fairy Wings)": { protElement: "holy", bonus: [3, 8, 15] },
                "Critical Hit (Strike)": { special: "crit", bonus: [15, 25, 50] },
                "Life Leech (Vampirism)": { special: "life", bonus: [5, 10, 25] },
                "Mana Leech (Void)": { special: "mana", bonus: [3, 5, 8] }
            };

            for (let slot in activeData) {
                const dados = activeData[slot];
                if (dados && dados.item) {
                    const item = dados.item;

                    if (item.atributos) {
                        let parts = String(item.atributos).toLowerCase().split(',');
                        parts.forEach(p => {
                            let match = p.match(/([a-z\s]+)\s*([+-]\s*\d+)/);
                            if (match) {
                                let attr = match[1].trim();
                                let val = parseInt(match[2].replace(/\s/g, ''));
                                if (attr === 'magic level') bonus.ml += val;
                                else if (attr.includes('sword fighting')) bonus.sword += val;
                                else if (attr.includes('axe fighting')) bonus.axe += val;
                                else if (attr.includes('club fighting')) bonus.club += val;
                                else if (attr.includes('distance fighting')) bonus.dist += val;
                                else if (attr.includes('shielding')) bonus.shield += val;
                                else if (attr.includes('fist')) bonus.fist += val;
                            }
                        });
                    }

                    if (item.protecao) {
                        let parts = String(item.protecao).toLowerCase().split(',');
                        parts.forEach(p => {
                            let match = p.match(/([a-z\s]+)\s*([+-]\s*\d+)\s*%/);
                            if (match) {
                                let element = match[1].trim();
                                let val = parseInt(match[2].replace(/\s/g, ''));
                                let factor = 1 - (val / 100);
                                if (element.includes('physical')) protecoes.physical *= factor;
                                else if (element.includes('fire')) protecoes.fire *= factor;
                                else if (element.includes('earth')) protecoes.earth *= factor;
                                else if (element.includes('ice')) protecoes.ice *= factor;
                                else if (element.includes('energy')) protecoes.energy *= factor;
                                else if (element.includes('death')) protecoes.death *= factor;
                                else if (element.includes('holy')) protecoes.holy *= factor;
                                else if (element.includes('life drain')) protecoes.lifeDrain *= factor;
                                else if (element.includes('mana drain')) protecoes.manaDrain *= factor;
                            }
                        });
                    }

                    if (dados.imbuements) {
                        dados.imbuements.forEach(imb => {
                            const details = imbStats[imb.tipo];
                            if (details) {
                                if (details.stat) bonus[details.stat] += details.bonus[imb.tier];
                                if (details.protElement) {
                                    let factor = 1 - (details.bonus[imb.tier] / 100);
                                    protecoes[details.protElement] *= factor;
                                }
                                if (details.special) {
                                    if (details.special === 'crit') specials.crit = Math.max(specials.crit, details.bonus[imb.tier]);
                                    else specials[details.special] += details.bonus[imb.tier];
                                }
                            }
                        });
                    }
                }
            }
            return { bonus, protecoes, specials };
        }

        function renderSkillsLeft(member, dataBonus) {
            let voc = String(member.vocation).toLowerCase();
            const bonus = dataBonus.bonus;

            let html = '<div class="d-flex flex-column w-100 mt-3" style="font-family: \'Verdana\', sans-serif;">';
            html += `<div><span class="d-block border-bottom border-dark pb-1 mb-2 text-center" style="font-size: 11px; color: #dfdfdf;">Skills</span></div>`;

            let skillsHtml = '<div class="d-flex flex-column gap-2">';

            const renderSkillBar = (label, baseVal, bVal) => {
                baseVal = parseInt(baseVal);
                if (isNaN(baseVal)) baseVal = (label === 'ML' ? 0 : 10);

                let total = baseVal + bVal;
                let barColor = bVal > 0 ? '#00ff00' : (label === 'ML' ? '#0dcaf0' : '#dc3545');
                let textClass = bVal > 0 ? 'text-success' : 'text-white';

                let percentual = 0;
                if (total > 0) {
                    percentual = (total * 17) % 100;
                    if (total === 10 && label !== 'ML') percentual = 0;
                }

                let tooltipAttr = '';
                if (bVal !== 0) {
                    let sign = bVal > 0 ? '+ ' : '- ';
                    let bValAbsoluto = Math.abs(bVal);
                    tooltipAttr = `data-bs-toggle="tooltip" data-bs-placement="top" title="${total} = ${baseVal} ${sign}${bValAbsoluto}"`;
                }

                return `
                    <div class="mb-1 p-1 rounded" style="background-color: #111; border: 1px solid #222;" ${tooltipAttr}>
                        <div class="d-flex justify-content-between px-1 mb-1">
                            <span style="color: #ccc; font-size: 11px;">${label}</span>
                            <span class="${textClass}" style="font-size: 11px;">${total}</span>
                        </div>
                        <div class="progress" style="height: 4px; background-color: #000; border-radius: 0;">
                            <div class="progress-bar" style="width: ${percentual}%; background-color: ${barColor}; transition: width 1s ease-out;"></div>
                        </div>
                    </div>
                `;
            };

            let sTemp = '';
            if (voc.includes('sorcerer') || voc.includes('druid')) {
                sTemp += renderSkillBar('ML', member.magicLevel, bonus.ml);
            } else if (voc.includes('paladin')) {
                sTemp += renderSkillBar('ML', member.magicLevel, bonus.ml) + renderSkillBar('Dist', member.distanceSkill, bonus.dist) + renderSkillBar('Shield', member.shieldingSkill, bonus.shield);
            } else if (voc.includes('knight')) {
                sTemp += renderSkillBar('ML', member.magicLevel, bonus.ml) + renderSkillBar('Sword', member.swordSkill, bonus.sword) + renderSkillBar('Axe', member.axeSkill, bonus.axe) + renderSkillBar('Club', member.clubSkill, bonus.club) + renderSkillBar('Shield', member.shieldingSkill, bonus.shield);
            } else if (voc.includes('monk')) {
                sTemp += renderSkillBar('ML', member.magicLevel, bonus.ml) + renderSkillBar('Fist', member.fistSkill, bonus.fist);
            }

            if (sTemp !== '') skillsHtml += sTemp;
            else skillsHtml += '<span class="text-secondary small text-center">Sem skills</span>';

            skillsHtml += '</div></div>';
            return html + skillsHtml;
        }

        function renderStatsRight(dataBonus) {
            const protecoes = dataBonus.protecoes;
            const specials = dataBonus.specials;

            let html = '<div class="d-flex flex-column gap-3 w-100" style="font-family: \'Verdana\', sans-serif;">';

            let specialHtml = '<div class="d-flex flex-column gap-1">';
            let hasSpecial = false;

            const renderSpecialLine = (label, val) => {
                if (val <= 0) return '';
                hasSpecial = true;
                return `
                    <div class="d-flex justify-content-between align-items-center px-1 border-secondary pb-1">
                        <span class="text-secondary" style="font-size: 0.85em;">${label}</span>
                        <span style="font-size: 0.85em;">+${val}%</span>
                    </div>
                `;
            };

            let spTemp = '';
            spTemp += renderSpecialLine('Critical hit', specials.crit);
            spTemp += renderSpecialLine('Life Leech amount', specials.life);
            spTemp += renderSpecialLine('Mana Leech amount', specials.mana);

            if (hasSpecial) specialHtml += spTemp;
            else specialHtml += '<span class="text-secondary small px-1">Nenhum</span>';

            specialHtml += '</div>';
            html += `<div><span class="d-block border-bottom border-dark pb-1 mb-2" style="font-size: 11px;">Imbuements</span>${specialHtml}</div>`;

            let protHtml = '<div class="d-flex flex-column gap-1">';
            const renderProtectionRow = (label, pVal, iconHtml) => {
                let val = Math.round((1 - pVal) * 100);
                if (val === 0) return '';
                let colorClass = val > 0 ? 'text-success' : 'text-danger';
                let sign = val > 0 ? '+' : '';

                return `
                    <div class="d-flex justify-content-between align-items-center px-1 border-secondary pb-1">
                        <span class="text-secondary" style="font-size: 0.85em;">${label}</span>
                        <div class="d-flex align-items-center gap-1">
                            <span class="${colorClass}" style="font-size: 0.85em;">${sign}${val}%</span>
                            ${iconHtml}
                        </div>
                    </div>
                `;
            };

            let pTemp = '';
            pTemp += renderProtectionRow('Physical', protecoes.physical, '<img src="https://www.tibiawiki.com.br/images/3/37/Physical_Damage_Icon.gif" style="width: 11px; height: 11px; vertical-align: middle;">');
            pTemp += renderProtectionRow('Fire', protecoes.fire, '<img src="https://www.tibiawiki.com.br/images/f/fb/Burning_Icon.gif" style="width: 11px; height: 11px; vertical-align: middle;">');
            pTemp += renderProtectionRow('Earth', protecoes.earth, '<img src="https://www.tibiawiki.com.br/images/5/5e/Poisoned_Icon.gif" style="width: 11px; height: 11px; vertical-align: middle;">');
            pTemp += renderProtectionRow('Ice', protecoes.ice, '<img src="https://www.tibiawiki.com.br/images/8/88/Freezing_Icon.gif" style="width: 11px; height: 11px; vertical-align: middle;">');
            pTemp += renderProtectionRow('Energy', protecoes.energy, '<img src="https://www.tibiawiki.com.br/images/3/30/Electrified_Icon.gif" style="width: 11px; height: 11px; vertical-align: middle;">');
            pTemp += renderProtectionRow('Death', protecoes.death, '<img src="https://www.tibiawiki.com.br/images/9/9c/Cursed_Icon.gif" style="width: 11px; height: 11px; vertical-align: middle;">');
            pTemp += renderProtectionRow('Holy', protecoes.holy, '<img src="https://www.tibiawiki.com.br/images/3/38/Dazzled_Icon.gif" style="width: 11px; height: 11px; vertical-align: middle;">');
            pTemp += renderProtectionRow('Life Drain', protecoes.lifeDrain, '<img src="https://www.tibiawiki.com.br/images/f/f1/Drowning_Icon.gif" style="width: 11px; height: 11px; vertical-align: middle;">');
            pTemp += renderProtectionRow('Mana Drain', protecoes.manaDrain, '<img src="https://www.tibiawiki.com.br/images/f/f1/Drowning_Icon.gif" style="width: 11px; height: 11px; vertical-align: middle;">');

            if (pTemp !== '') protHtml += pTemp;
            else protHtml += '<span class="text-secondary small px-1">Nenhuma</span>';
            protHtml += '</div>';

            html += `<div><span class="d-block border-bottom border-dark pb-1 mb-2" style="font-size: 11px;">Proteções</span>${protHtml}</div>`;

            html += '</div>';
            return html;
        }

        document.addEventListener("DOMContentLoaded", function () {
            document.querySelectorAll('.anuncio-render-area').forEach(area => {
                const d = area.dataset;
                let activeData = null;
                try {
                    const sets = JSON.parse(d.userJson);
                    activeData = sets[1];
                } catch (e) { }

                const mockMember = {
                    vocation: d.voc,
                    magicLevel: d.ml,
                    distanceSkill: d.dist,
                    swordSkill: d.sword,
                    axeSkill: d.axe,
                    clubSkill: d.club,
                    shieldingSkill: d.shield,
                    fistSkill: d.fist
                };

                const dataBonus = calcularBonus(activeData);

                let gridHtml = '<div class="d-flex flex-column align-items-center gap-1">';
                slotMatrix.forEach(row => {
                    gridHtml += '<div class="d-flex gap-1">';
                    row.forEach(slot => {
                        if (!slot) gridHtml += '<div style="width: 34px;"></div>';
                        else {
                            let imgUrl = imagensPadrao[slot];
                            let opacityClass = 'opacity-25';
                            let itemName = 'Vazio';

                            if (activeData && activeData[slot] && activeData[slot].item) {
                                imgUrl = activeData[slot].item.imagemUrl;
                                opacityClass = '';
                                itemName = activeData[slot].item.nome;
                            }
                            gridHtml += `<div class="mini-equip-slot" data-bs-toggle="tooltip" title="${itemName}">
                                            <img src="${imgUrl}" class="${opacityClass}">
                                         </div>`;
                        }
                    });
                    gridHtml += '</div>';
                });
                gridHtml += '</div>';

                const htmlSkillsLeft = renderSkillsLeft(mockMember, dataBonus);
                const htmlStatsRight = renderStatsRight(dataBonus);

                area.innerHTML = `
                    <div class="d-flex align-items-start gap-4 flex-grow-1">
                        <div class="flex-shrink-0" style="width: 114px;">
                            ${gridHtml}
                            ${htmlSkillsLeft}
                        </div>
                        <div class="flex-grow-1 border-start border-dark ps-3">
                            ${htmlStatsRight}
                        </div>
                    </div>
                `;
            });

            var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
            tooltipTriggerList.map(function (tooltipTriggerEl) { return new bootstrap.Tooltip(tooltipTriggerEl); });
        });
    </script>
</body>

</html>
