# ConfiguraĂ§ĂŁo de conexĂŁo
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ConfiguraĂ§Ăµes do Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Desabilita o cache do Thymeleaf para ver mudanĂ§as no HTML na hora
spring.thymeleaf.cache=false

# Desabilita o cache de arquivos estĂˇticos (CSS/JS)
spring.web.resources.static-locations=classpath:/static/
spring.devtools.livereload.enabled=true

# O Railway injeta a porta automaticamente. Se nĂŁo existir (no seu PC), usa a 8080.
server.port=${PORT:8080}

