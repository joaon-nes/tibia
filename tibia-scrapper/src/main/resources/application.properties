# ConfiguraĂ§ĂŁo de conexĂŁo
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ConfiguraĂ§Ăµes do Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Desabilita o cache do Thymeleaf para ver mudanĂ§as no HTML na hora
spring.thymeleaf.cache=false

# Desabilita o cache de arquivos estĂˇticos (CSS/JS)
spring.web.resources.static-locations=classpath:/static/,file:C:/tibia-images/
spring.devtools.livereload.enabled=true

# Railway
server.port=${PORT:8080}

# ConfiguraĂ§Ăµes de Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

